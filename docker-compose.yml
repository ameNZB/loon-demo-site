services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: loon_demo
    ports:
      - "5544:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"

  app:
    build:
      context: .
      # loon + loon-plugins + loon-baseline are sibling checkouts the go.mod
      # replaces point at; supply them to the build as named contexts (requires
      # BuildKit, default in modern Docker). See Dockerfile.
      additional_contexts:
        loon: ../loon
        loonplugins: ../loon-plugins
        loonbaseline: ../loon-baseline
    environment:
      # talk to the db service over the compose network, not the published port
      LOON_DEMO_DSN: "postgres://demo:demo@db:5432/loon_demo?sslmode=disable"
      # Page cache backend. Unset -> in-memory; set -> the redis impl.
      REDIS_ADDR: "${REDIS_ADDR-redis:6379}"
      # Metadata-source credentials (optional — set on the host to enable a source):
      #   TPDB_API_KEY = ThePornDB bearer token (xxx)   ANIDB_CLIENT = registered AniDB client name (anime)
      TPDB_API_KEY: "${TPDB_API_KEY:-}"
      ANIDB_CLIENT: "${ANIDB_CLIENT:-}"
      # Cloudflare Turnstile (optional). Unset = captcha disabled. Cloudflare's
      # public test keys are handy here: sitekey 1x00000000000000000000AA +
      # secret 1x0000000000000000000000000000000AA (always pass) or secret
      # 2x0000000000000000000000000000000AA (always fail).
      TURNSTILE_SITEKEY: "${TURNSTILE_SITEKEY:-}"
      TURNSTILE_SECRET: "${TURNSTILE_SECRET:-}"
    ports:
      - "8090:8090"
    depends_on:
      - db
      - redis
    restart: unless-stopped
